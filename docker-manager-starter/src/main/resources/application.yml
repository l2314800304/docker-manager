server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: docker-manager
  profiles:
    active: local
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:h2:file:./data/dockermanager;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Docker 连接配置（默认宿主机，启动时自动注册到数据库）
docker:
  connection:
    type: socket
    socket-path: npipe:////./pipe/docker_engine
    tcp-host: tcp://localhost:2375
    tls-enabled: false
    cert-path:
  # 默认宿主机名称
  default-host-name: 本地Docker

# 告警检查配置
alert:
  # 检查间隔（毫秒），默认 60 秒
  check-interval: 60000
  # 启用告警检查
  enabled: true

jwt:
  secret: docker-manager-secret-key-that-is-at-least-256-bits-long-for-hs256
  expiration: 86400000

logging:
  level:
    com.dockermanager: DEBUG
    com.github.dockerjava: WARN
